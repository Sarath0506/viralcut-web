# Railway — @viralcut/portal
#
# Dashboard:
#   New Service → GitHub Repo → Sarath0506/viralcut-web
#   Root Directory: /
#   Config file: /apps/portal/railway.toml
#
# Variables (set BEFORE first deploy — Vite bakes this at build time):
#   VITE_API_URL = https://<api-service>.up.railway.app

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm build:portal"

[deploy]
startCommand = "pnpm --filter @viralcut/portal start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
